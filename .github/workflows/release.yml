name: Release compiler binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: pino-windows-x64
            file_name: pino-windows-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: pino-linux-x64
            file_name: pino-linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact_name: pino-macos-x64
            file_name: pino-macos-x64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish binary
        run: dotnet publish pino-csharp/pino-csharp.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o ./publish

      - name: Build Boehm GC and package runtime
        run: |
          cp -r tooling publish/
          cp -r runtime publish/
          git clone --depth=1 https://github.com/ivmai/bdwgc.git
          cd bdwgc
          git clone --depth=1 https://github.com/ivmai/libatomic_ops.git
          cmake -B build -Denable_threads=ON -Denable_gc_assertions=OFF -DBUILD_SHARED_LIBS=OFF .
          cmake --build build --config Release
          mkdir -p ../publish/tooling/tcc/lib
          mkdir -p ../publish/tooling/tcc/include
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/Release/gc.lib ../publish/tooling/tcc/lib/
          else
            cp build/libgc.a ../publish/tooling/tcc/lib/
            cp build/libgc.a ../publish/tooling/tcc/lib/libgc.a
          fi
          cp -r include/* ../publish/tooling/tcc/include/
        shell: bash

      - name: Rename and compress binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd publish
          Rename-Item -Path "pino-csharp.exe" -NewName "pino.exe"
          Compress-Archive -Path "pino.exe", "tooling", "runtime" -DestinationPath "../${{ matrix.file_name }}"
        shell: pwsh

      - name: Rename and compress binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd publish
          mv pino-csharp pino
          chmod +x pino
          tar -czf ../${{ matrix.file_name }} pino tooling runtime
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.file_name }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
